<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>frontend</title>
  <link rel="manifest" href="manifest.json">

  <!-- CanvasKit & Fallback Fonts Configuration -->
  <script>
    window.flutterConfiguration = {
      fontFallbackProviders: []
    };
  </script>

  <!-- Google Maps Web Dynamic SDK Loader -->
  <script>
    window.loadGoogleMapsSdk = function(apiKey) {
      if (window.google && window.google.maps) {
        console.log("Google Maps SDK already loaded.");
        if (window.onGoogleMapsLoaded) {
          window.onGoogleMapsLoaded();
        }
        return;
      }
      
      var existingScript = document.getElementById('google-maps-sdk');
      if (existingScript) {
        existingScript.remove();
      }
      
      var script = document.createElement('script');
      script.id = 'google-maps-sdk';
      script.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&callback=initGoogleMapsCallback';
      script.async = true;
      script.defer = true;
      script.onerror = function() {
        console.error("Failed to load Google Maps SDK script.");
        if (window.onGoogleMapsLoadError) {
          window.onGoogleMapsLoadError();
        }
      };
      document.head.appendChild(script);
    };

    window.initGoogleMapsCallback = function() {
      console.log("Google Maps SDK initialized successfully.");
      if (window.onGoogleMapsLoaded) {
        window.onGoogleMapsLoaded();
      }
    };
  </script>

  <!-- Firebase Messaging Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then(function(reg) {
            console.log('Firebase Service Worker registered scope: ', reg.scope);
          })
          .catch(function(err) {
            console.error('Firebase Service Worker registration failed: ', err);
          });
      });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
