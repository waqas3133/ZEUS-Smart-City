name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2
  firebase_storage: ^13.3.2
  image_picker: ^1.1.2
  google_maps_flutter: ^2.17.0
  http: ^1.6.0
  dio: ^5.9.2
  glassmorphism: ^3.0.0
  go_router: ^17.2.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/logo/
    - assets/images/

# یہ بالکل بائیں کونے (Zero Space) سے شروع ہو رہا ہے اور 100% پرفیکٹ ہے
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21